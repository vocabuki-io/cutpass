<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seikyu — インボイス対応 請求書ジェネレーター</title>
<meta name="description" content="2分で発行できるインボイス制度対応の請求書ジェネレーター。" />

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />

<style>
  body { background: #EFEAE0; color: #1A1818; }
  .serif { font-family: 'Noto Serif JP', serif; }
  .sans { font-family: 'Noto Sans JP', sans-serif; letter-spacing: 0.01em; }
  .num { font-variant-numeric: tabular-nums; }
  @media print {
    .no-print { display: none !important; }
    body, html { background: white !important; }
    .invoice-paper { box-shadow: none !important; margin: 0 !important; padding: 0 !important; }
    main { display: block !important; padding: 0 !important; }
    main > div:last-child { display: block !important; }
  }
</style>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>
<body class="sans">
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

/* ---------- Icons (inline SVG) ---------- */
const Icon = ({ children, className = "w-4 h-4", style }) => (
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={style}>
    {children}
  </svg>
);
const Plus      = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
const Trash2    = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></Icon>;
const Printer   = (p) => <Icon {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></Icon>;
const FileText  = (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></Icon>;
const Crown     = (p) => <Icon {...p}><path d="M2 4l3 12h14l3-12-6 7-4-7-4 7z"/><line x1="5" y1="20" x2="19" y2="20"/></Icon>;
const X         = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
const Check     = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;
const Building2 = (p) => <Icon {...p}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v8h4"/><path d="M18 9h2a2 2 0 0 1 2 2v11h-4"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></Icon>;
const UserIcon  = (p) => <Icon {...p}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Icon>;
const Receipt   = (p) => <Icon {...p}><path d="M4 2v20l2-2 2 2 2-2 2 2 2-2 2 2 2-2 2 2V2l-2 2-2-2-2 2-2-2-2 2-2-2-2 2Z"/><path d="M16 8H8"/><path d="M16 12H8"/><path d="M13 16H8"/></Icon>;
const Sparkles  = (p) => <Icon {...p}><path d="M12 3l1.9 5.8L20 11l-6.1 1.9L12 19l-1.9-5.8L4 11l6.1-2.2Z"/></Icon>;
const Lock      = (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Icon>;

/* ---------- App ---------- */
function App() {
  const [plan, setPlan] = useState("free");
  const [showPlanModal, setShowPlanModal] = useState(false);

  const [issuer, setIssuer] = useState({
    name: "山林デザイン事務所",
    postal: "〒530-0001",
    address: "大阪府大阪市北区梅田1-1-1",
    tel: "06-1234-5678",
    email: "info@example.co.jp",
    registration: "T1234567890123",
    bank: "三井住友銀行 梅田支店 普通 1234567 ヤマバヤシ リュウセイ",
  });

  const [client, setClient] = useState({
    name: "株式会社サンプル",
    postal: "〒100-0001",
    address: "東京都千代田区千代田1-1-1",
    contact: "経理部 御中",
  });

  const [doc, setDoc] = useState({
    number: "INV-2026-0001",
    issueDate: "2026-05-12",
    dueDate: "2026-06-30",
  });

  const [items, setItems] = useState([
    { id: 1, name: "コーポレートサイト制作", qty: 1, unit: "式", price: 380000, taxRate: 10 },
    { id: 2, name: "ロゴデザイン", qty: 1, unit: "式", price: 120000, taxRate: 10 },
    { id: 3, name: "撮影用書籍", qty: 4, unit: "冊", price: 1800, taxRate: 8 },
  ]);

  const [note, setNote] = useState("お振込手数料は貴社にてご負担ください。");

  const addItem = () => setItems([...items, { id: Date.now(), name: "", qty: 1, unit: "式", price: 0, taxRate: 10 }]);
  const removeItem = (id) => setItems(items.filter((i) => i.id !== id));
  const updateItem = (id, field, value) => setItems(items.map((i) => (i.id === id ? { ...i, [field]: value } : i)));

  const subtotalByRate = items.reduce((acc, item) => {
    const subtotal = (Number(item.qty) || 0) * (Number(item.price) || 0);
    acc[item.taxRate] = (acc[item.taxRate] || 0) + subtotal;
    return acc;
  }, {});
  const subtotal = Object.values(subtotalByRate).reduce((a, b) => a + b, 0);
  const taxByRate = Object.entries(subtotalByRate).reduce((acc, [rate, sub]) => {
    acc[rate] = Math.floor(sub * (Number(rate) / 100));
    return acc;
  }, {});
  const totalTax = Object.values(taxByRate).reduce((a, b) => a + b, 0);
  const total = subtotal + totalTax;
  const fmt = (n) => "¥" + (Number(n) || 0).toLocaleString();

  const handlePrint = () => window.print();

  return (
    <div className="sans min-h-screen" style={{ background: "#EFEAE0", color: "#1A1818" }}>
      {/* HEADER */}
      <header className="no-print sticky top-0 z-30 border-b backdrop-blur" style={{ borderColor: "#D9D2C2", background: "rgba(250,247,241,0.85)" }}>
        <div className="max-w-7xl mx-auto px-5 py-3.5 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 rounded-sm flex items-center justify-center serif font-bold text-lg" style={{ background: "#9B2C2C", color: "#FAF7F1" }}>請</div>
            <div>
              <div className="serif font-bold text-base leading-tight">Seikyu</div>
              <div className="text-[10px] tracking-widest uppercase" style={{ color: "#6B6256" }}>インボイス対応 請求書 SaaS</div>
            </div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={() => setShowPlanModal(true)} className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium border transition hover:bg-white" style={{ borderColor: plan === "pro" ? "#9B2C2C" : "#D9D2C2", color: plan === "pro" ? "#9B2C2C" : "#6B6256" }}>
              {plan === "pro" ? <Crown className="w-3.5 h-3.5" /> : <Sparkles className="w-3.5 h-3.5" />}
              {plan === "pro" ? "Pro" : "Free"}
            </button>
            <button onClick={handlePrint} className="flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-xs font-medium text-white transition hover:opacity-90" style={{ background: "#1A1818" }}>
              <Printer className="w-3.5 h-3.5" />PDF出力
            </button>
          </div>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-5 py-7 grid lg:grid-cols-2 gap-7">
        {/* LEFT: FORM */}
        <div className="no-print space-y-6">
          <Section icon={<Building2 className="w-4 h-4" />} title="自社情報" sub="Issuer">
            <Field label="事業者名" value={issuer.name} onChange={(v) => setIssuer({ ...issuer, name: v })} />
            <div className="grid grid-cols-3 gap-3">
              <Field label="郵便番号" value={issuer.postal} onChange={(v) => setIssuer({ ...issuer, postal: v })} />
              <Field className="col-span-2" label="住所" value={issuer.address} onChange={(v) => setIssuer({ ...issuer, address: v })} />
            </div>
            <div className="grid grid-cols-2 gap-3">
              <Field label="電話番号" value={issuer.tel} onChange={(v) => setIssuer({ ...issuer, tel: v })} />
              <Field label="メール" value={issuer.email} onChange={(v) => setIssuer({ ...issuer, email: v })} />
            </div>
            <Field label="適格請求書発行事業者番号" value={issuer.registration} onChange={(v) => setIssuer({ ...issuer, registration: v })} hint="T + 13桁" accent />
            <Field label="振込先" value={issuer.bank} onChange={(v) => setIssuer({ ...issuer, bank: v })} />
          </Section>

          <Section icon={<UserIcon className="w-4 h-4" />} title="請求先" sub="Bill to">
            <Field label="宛先" value={client.name} onChange={(v) => setClient({ ...client, name: v })} />
            <div className="grid grid-cols-3 gap-3">
              <Field label="郵便番号" value={client.postal} onChange={(v) => setClient({ ...client, postal: v })} />
              <Field className="col-span-2" label="住所" value={client.address} onChange={(v) => setClient({ ...client, address: v })} />
            </div>
            <Field label="担当・部署" value={client.contact} onChange={(v) => setClient({ ...client, contact: v })} />
          </Section>

          <Section icon={<Receipt className="w-4 h-4" />} title="請求書情報" sub="Document">
            <div className="grid grid-cols-3 gap-3">
              <Field label="請求書番号" value={doc.number} onChange={(v) => setDoc({ ...doc, number: v })} />
              <Field label="発行日" type="date" value={doc.issueDate} onChange={(v) => setDoc({ ...doc, issueDate: v })} />
              <Field label="支払期限" type="date" value={doc.dueDate} onChange={(v) => setDoc({ ...doc, dueDate: v })} />
            </div>
          </Section>

          <Section icon={<FileText className="w-4 h-4" />} title="明細" sub="Line items">
            <div className="space-y-2">
              {items.map((item) => (
                <div key={item.id} className="grid grid-cols-12 gap-2 items-end p-3 rounded border" style={{ borderColor: "#E5DFD3", background: "#FAF7F1" }}>
                  <div className="col-span-12 sm:col-span-5">
                    <MiniLabel>品目</MiniLabel>
                    <input value={item.name} onChange={(e) => updateItem(item.id, "name", e.target.value)} className="w-full bg-transparent border-b outline-none text-sm py-1" style={{ borderColor: "#D9D2C2" }} />
                  </div>
                  <div className="col-span-3 sm:col-span-1">
                    <MiniLabel>数量</MiniLabel>
                    <input type="number" value={item.qty} onChange={(e) => updateItem(item.id, "qty", e.target.value)} className="w-full bg-transparent border-b outline-none text-sm py-1 num" style={{ borderColor: "#D9D2C2" }} />
                  </div>
                  <div className="col-span-3 sm:col-span-1">
                    <MiniLabel>単位</MiniLabel>
                    <input value={item.unit} onChange={(e) => updateItem(item.id, "unit", e.target.value)} className="w-full bg-transparent border-b outline-none text-sm py-1" style={{ borderColor: "#D9D2C2" }} />
                  </div>
                  <div className="col-span-3 sm:col-span-2">
                    <MiniLabel>単価</MiniLabel>
                    <input type="number" value={item.price} onChange={(e) => updateItem(item.id, "price", e.target.value)} className="w-full bg-transparent border-b outline-none text-sm py-1 num" style={{ borderColor: "#D9D2C2" }} />
                  </div>
                  <div className="col-span-2 sm:col-span-2">
                    <MiniLabel>税率</MiniLabel>
                    <select value={item.taxRate} onChange={(e) => updateItem(item.id, "taxRate", Number(e.target.value))} className="w-full bg-transparent border-b outline-none text-sm py-1" style={{ borderColor: "#D9D2C2" }}>
                      <option value={10}>10%</option>
                      <option value={8}>8%(軽)</option>
                    </select>
                  </div>
                  <div className="col-span-1 flex justify-end">
                    <button onClick={() => removeItem(item.id)} className="p-1.5 rounded hover:bg-white transition" style={{ color: "#9B2C2C" }} aria-label="削除">
                      <Trash2 className="w-3.5 h-3.5" />
                    </button>
                  </div>
                </div>
              ))}
            </div>
            <button onClick={addItem} className="mt-2 flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-full border transition hover:bg-white" style={{ borderColor: "#D9D2C2", color: "#6B6256" }}>
              <Plus className="w-3.5 h-3.5" />明細を追加
            </button>
          </Section>

          <Section title="備考" sub="Notes">
            <textarea value={note} onChange={(e) => setNote(e.target.value)} rows={3} className="w-full bg-transparent border-b outline-none text-sm py-1 resize-none" style={{ borderColor: "#D9D2C2" }} />
          </Section>
        </div>

        {/* RIGHT: PREVIEW */}
        <div>
          <div className="lg:sticky lg:top-24">
            <div className="invoice-paper relative serif" style={{ background: "#FAF7F1", boxShadow: "0 10px 40px -10px rgba(26,24,24,0.15), 0 2px 6px rgba(26,24,24,0.06)", aspectRatio: "210 / 297", padding: "44px 40px", color: "#1A1818" }}>
              {plan === "free" && (
                <div className="absolute inset-0 pointer-events-none flex items-center justify-center" style={{ background: "repeating-linear-gradient(45deg, transparent, transparent 80px, rgba(155,44,44,0.03) 80px, rgba(155,44,44,0.03) 160px)" }}>
                  <div className="serif font-bold opacity-10 select-none" style={{ fontSize: "92px", transform: "rotate(-25deg)", color: "#9B2C2C", letterSpacing: "0.1em" }}>SEIKYU</div>
                </div>
              )}

              <div className="relative flex items-baseline justify-between border-b-2 pb-3 mb-6" style={{ borderColor: "#1A1818" }}>
                <h1 className="serif font-black text-3xl tracking-[0.3em]">御 請 求 書</h1>
                <div className="text-right text-[10px] tracking-widest uppercase" style={{ color: "#6B6256" }}>Invoice</div>
              </div>

              <div className="relative grid grid-cols-2 gap-6 mb-6">
                <div>
                  <div className="text-[10px] tracking-widest uppercase mb-1.5" style={{ color: "#6B6256" }}>Bill To</div>
                  <div className="serif font-bold text-lg leading-tight mb-1">{client.name} <span className="text-xs font-normal">{client.contact}</span></div>
                  <div className="text-[11px] sans leading-relaxed" style={{ color: "#3A3633" }}>
                    {client.postal}<br />
                    {client.address}
                  </div>
                </div>
                <div className="text-right">
                  <div className="text-[10px] tracking-widest uppercase mb-1.5" style={{ color: "#6B6256" }}>Issued By</div>
                  <div className="serif font-bold text-base leading-tight">{issuer.name}</div>
                  <div className="text-[11px] sans leading-relaxed" style={{ color: "#3A3633" }}>
                    {issuer.postal} {issuer.address}<br />
                    TEL {issuer.tel}<br />
                    <span className="font-semibold" style={{ color: "#9B2C2C" }}>登録番号 {issuer.registration}</span>
                  </div>
                </div>
              </div>

              <div className="relative grid grid-cols-3 gap-4 mb-6 text-[11px] sans border-y py-2.5" style={{ borderColor: "#D9D2C2" }}>
                <div><div className="uppercase tracking-widest text-[9px]" style={{ color: "#6B6256" }}>No.</div><div className="font-semibold num">{doc.number}</div></div>
                <div><div className="uppercase tracking-widest text-[9px]" style={{ color: "#6B6256" }}>Issue Date</div><div className="font-semibold num">{doc.issueDate}</div></div>
                <div><div className="uppercase tracking-widest text-[9px]" style={{ color: "#6B6256" }}>Due Date</div><div className="font-semibold num">{doc.dueDate}</div></div>
              </div>

              <div className="relative mb-6 p-4 flex items-baseline justify-between" style={{ background: "#1A1818", color: "#FAF7F1" }}>
                <div className="serif text-sm tracking-[0.3em]">合 計 金 額</div>
                <div className="serif font-bold text-2xl num">{fmt(total)}</div>
              </div>

              <table className="relative w-full text-[11px] sans mb-4">
                <thead>
                  <tr style={{ color: "#6B6256" }} className="text-left border-b">
                    <th className="py-1.5 font-normal uppercase tracking-wider text-[9px]">品目</th>
                    <th className="py-1.5 font-normal uppercase tracking-wider text-[9px] text-right w-10">数量</th>
                    <th className="py-1.5 font-normal uppercase tracking-wider text-[9px] text-right w-10">単位</th>
                    <th className="py-1.5 font-normal uppercase tracking-wider text-[9px] text-right w-20">単価</th>
                    <th className="py-1.5 font-normal uppercase tracking-wider text-[9px] text-right w-10">税</th>
                    <th className="py-1.5 font-normal uppercase tracking-wider text-[9px] text-right w-24">金額</th>
                  </tr>
                </thead>
                <tbody>
                  {items.map((item) => (
                    <tr key={item.id} className="border-b" style={{ borderColor: "#E5DFD3" }}>
                      <td className="py-2">{item.name} {item.taxRate === 8 && <span className="text-[9px]" style={{ color: "#9B2C2C" }}>※</span>}</td>
                      <td className="py-2 text-right num">{item.qty}</td>
                      <td className="py-2 text-right">{item.unit}</td>
                      <td className="py-2 text-right num">{fmt(item.price)}</td>
                      <td className="py-2 text-right">{item.taxRate}%</td>
                      <td className="py-2 text-right num font-semibold">{fmt(item.qty * item.price)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>

              <div className="relative flex justify-end mb-4">
                <div className="w-64 text-[11px] sans space-y-1">
                  <Row label="小計（税抜）" value={fmt(subtotal)} />
                  {Object.entries(subtotalByRate).map(([rate, sub]) => <Row key={rate} label={rate + "% 対象"} value={fmt(sub)} muted />)}
                  {Object.entries(taxByRate).map(([rate, tax]) => <Row key={rate} label={"消費税（" + rate + "%）"} value={fmt(tax)} muted />)}
                  <div className="border-t pt-1.5 mt-1.5" style={{ borderColor: "#1A1818" }}>
                    <Row label="合計" value={fmt(total)} bold />
                  </div>
                </div>
              </div>

              <div className="relative text-[10px] sans space-y-1.5 pt-3 border-t" style={{ borderColor: "#D9D2C2", color: "#3A3633" }}>
                <div><span style={{ color: "#6B6256" }}>振込先 / </span>{issuer.bank}</div>
                <div><span style={{ color: "#6B6256" }}>備考 / </span>{note}</div>
                <div className="text-[9px] pt-1" style={{ color: "#6B6256" }}>※ は軽減税率（8%）対象品目</div>
              </div>
            </div>

            {plan === "free" && (
              <div className="no-print mt-3 flex items-center gap-2 text-xs px-3 py-2 rounded" style={{ background: "#FAF7F1", color: "#6B6256" }}>
                <Lock className="w-3.5 h-3.5" style={{ color: "#9B2C2C" }} />
                Free プランは透かしと月3枚制限あり ·
                <button onClick={() => setShowPlanModal(true)} className="underline font-medium" style={{ color: "#9B2C2C" }}>Pro にする</button>
              </div>
            )}
          </div>
        </div>
      </main>

      {/* PLAN MODAL */}
      {showPlanModal && (
        <div className="no-print fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: "rgba(26,24,24,0.5)" }}>
          <div className="rounded-lg max-w-md w-full p-6 relative serif" style={{ background: "#FAF7F1" }}>
            <button onClick={() => setShowPlanModal(false)} className="absolute top-4 right-4 p-1" style={{ color: "#6B6256" }}><X className="w-4 h-4" /></button>
            <div className="sans text-[10px] tracking-widest uppercase mb-1" style={{ color: "#6B6256" }}>Pricing</div>
            <h2 className="font-bold text-2xl mb-5">プランを選ぶ</h2>

            <div className="space-y-3">
              <div onClick={() => { setPlan("free"); setShowPlanModal(false); }} className="border rounded p-4 cursor-pointer transition hover:bg-white" style={{ borderColor: plan === "free" ? "#1A1818" : "#D9D2C2" }}>
                <div className="flex items-baseline justify-between mb-2">
                  <div className="font-bold sans">Free</div>
                  <div className="sans"><span className="font-bold text-xl num">¥0</span><span className="text-xs" style={{ color: "#6B6256" }}> / 月</span></div>
                </div>
                <ul className="text-xs sans space-y-1" style={{ color: "#3A3633" }}>
                  <li className="flex gap-1.5"><Check className="w-3 h-3 mt-0.5" />月3枚まで作成</li>
                  <li className="flex gap-1.5"><Check className="w-3 h-3 mt-0.5" />PDFダウンロード</li>
                  <li className="flex gap-1.5" style={{ color: "#9B2C2C" }}><Lock className="w-3 h-3 mt-0.5" />透かし入り</li>
                </ul>
              </div>

              <div onClick={() => { setPlan("pro"); setShowPlanModal(false); }} className="border-2 rounded p-4 cursor-pointer relative" style={{ borderColor: "#9B2C2C", background: plan === "pro" ? "rgba(155,44,44,0.04)" : "transparent" }}>
                <div className="absolute -top-2.5 left-4 px-2 py-0.5 text-[9px] tracking-widest uppercase sans font-bold rounded" style={{ background: "#9B2C2C", color: "#FAF7F1" }}>Recommended</div>
                <div className="flex items-baseline justify-between mb-2">
                  <div className="font-bold sans flex items-center gap-1"><Crown className="w-3.5 h-3.5" style={{ color: "#9B2C2C" }} />Pro</div>
                  <div className="sans"><span className="font-bold text-xl num">¥980</span><span className="text-xs" style={{ color: "#6B6256" }}> / 月（税込）</span></div>
                </div>
                <ul className="text-xs sans space-y-1" style={{ color: "#3A3633" }}>
                  <li className="flex gap-1.5"><Check className="w-3 h-3 mt-0.5" />無制限に作成・透かし無し</li>
                  <li className="flex gap-1.5"><Check className="w-3 h-3 mt-0.5" />ロゴ・印影アップロード</li>
                  <li className="flex gap-1.5"><Check className="w-3 h-3 mt-0.5" />取引先・テンプレート保存</li>
                  <li className="flex gap-1.5"><Check className="w-3 h-3 mt-0.5" />CSV書き出し・売上集計</li>
                </ul>
              </div>
            </div>
            <p className="text-[10px] sans mt-4" style={{ color: "#6B6256" }}>※ 試作版のためStripe決済は未接続。本番ではこのモーダルから Stripe Checkout を起動します。</p>
          </div>
        </div>
      )}
    </div>
  );
}

function Section({ icon, title, sub, children }) {
  return (
    <section className="p-5 rounded border" style={{ background: "#FAF7F1", borderColor: "#E5DFD3" }}>
      <div className="flex items-baseline gap-2 mb-4 pb-2 border-b" style={{ borderColor: "#E5DFD3" }}>
        {icon && <span style={{ color: "#9B2C2C" }}>{icon}</span>}
        <h2 className="serif font-bold text-base">{title}</h2>
        {sub && <span className="text-[10px] tracking-widest uppercase" style={{ color: "#6B6256" }}>{sub}</span>}
      </div>
      <div className="space-y-3">{children}</div>
    </section>
  );
}

function Field({ label, value, onChange, type = "text", hint, accent, className = "" }) {
  return (
    <div className={className}>
      <MiniLabel accent={accent}>{label}{hint && <span className="ml-1.5 opacity-60 normal-case tracking-normal">{hint}</span>}</MiniLabel>
      <input type={type} value={value} onChange={(e) => onChange(e.target.value)} className="w-full bg-transparent border-b outline-none text-sm py-1.5" style={{ borderColor: accent ? "#9B2C2C" : "#D9D2C2", color: accent ? "#9B2C2C" : "#1A1818" }} />
    </div>
  );
}

function MiniLabel({ children, accent }) {
  return <div className="text-[10px] tracking-widest uppercase mb-0.5" style={{ color: accent ? "#9B2C2C" : "#6B6256" }}>{children}</div>;
}

function Row({ label, value, bold, muted }) {
  return (
    <div className="flex justify-between" style={{ color: muted ? "#6B6256" : "#1A1818" }}>
      <span className={bold ? "serif font-bold" : ""}>{label}</span>
      <span className={"num " + (bold ? "serif font-bold text-base" : "")}>{value}</span>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
